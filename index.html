<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Супер Кликер</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        #score { font-size: 3em; margin: 10px 0; color: #ffeb3b; }
        #clicker { width: 150px; height: 150px; border-radius: 50%; border: none; background: #4caf50; font-size: 2em; cursor: pointer; transition: 0.1s; }
        #clicker:active { transform: scale(0.9); }
        .shop-item { background: #333; padding: 15px; margin: 10px; border-radius: 10px; cursor: pointer; }
        .shop-item:hover { background: #444; }
    </style>
</head>
<body>

    <h1>Супер Кликер</h1>
    <div id="score">0</div>
    <p>Доход в сек: <span id="cps">0</span></p>
    
    <button id="clicker">🦆</button>

    <h2>Магазин</h2>
    <div id="shop">
        <div class="shop-item" onclick="buyUpgrade('clickPower')">
            Улучшить клик (+1 сила) <br> Цена: <span id="cost-clickPower">10</span>
        </div>
        <div class="shop-item" onclick="buyUpgrade('autoClicker')">
            Купить Автокликер (1/сек) <br> Цена: <span id="cost-autoClicker">50</span>
        </div>
    </div>

    <script>
        // Данные игры
        let game = {
            score: 0,
            clickPower: 1,
            autoClicker: 0,
            costClickPower: 10,
            costAutoClicker: 50
        };

        // Загрузка сохранений
        const savedGame = JSON.parse(localStorage.getItem('clickerSave'));
        if (savedGame) game = savedGame;

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(game.score);
            document.getElementById('cps').innerText = game.autoClicker;
            document.getElementById('cost-clickPower').innerText = Math.floor(game.costClickPower);
            document.getElementById('cost-autoClicker').innerText = Math.floor(game.costAutoClicker);
            localStorage.setItem('clickerSave', JSON.stringify(game));
        }

        document.getElementById('clicker').onclick = () => {
            game.score += game.clickPower;
            updateUI();
        };

        function buyUpgrade(type) {
            if (type === 'clickPower' && game.score >= game.costClickPower) {
                game.score -= game.costClickPower;
                game.clickPower += 1;
                game.costClickPower *= 1.5;
            } else if (type === 'autoClicker' && game.score >= game.costAutoClicker) {
                game.score -= game.costAutoClicker;
                game.autoClicker += 1;
                game.costAutoClicker *= 1.5;
            }
            updateUI();
        }

        // Автокликер (каждую секунду)
        setInterval(() => {
            game.score += game.autoClicker;
            updateUI();
        }, 1000);

        updateUI();
    </script>
</body>
</html>

</head>
<body>

    <div class="score-container">
        💰 Баланс: <span id="score">0</span>
    </div>

    <div class="coin" id="clickBtn">🪙</div>

    <script>
        // Инициализируем Telegram WebApp API
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем на весь экран

        let score = 0;
        const scoreEl = document.getElementById('score');
        const coinEl = document.getElementById('clickBtn');

        coinEl.addEventListener('click', () => {
            score++;
            scoreEl.innerText = score;
            
            // Легкая вибрация при клике (работает на смартфонах в ТГ)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
        });
    </script>
</body>
</html>
