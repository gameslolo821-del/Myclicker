<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Clicker WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #111119);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .score-container {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .coin {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #f39c12, #d35400);
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 0 15px rgba(255,255,255,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
        }
        .coin:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="score-container">
        💰 Баланс: <span id="score">0</span>
    </div>

    <div class="coin" id="clickBtn">🪙</div>

    <script>
        // Инициализируем Telegram WebApp API
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем на весь экран

        let score = 0;
        const scoreEl = document.getElementById('score');
        const coinEl = document.getElementById('clickBtn');

        coinEl.addEventListener('click', () => {
            score++;
            scoreEl.innerText = score;
            
            // Легкая вибрация при клике (работает на смартфонах в ТГ)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
        });
    </script>
</body>
</html>
